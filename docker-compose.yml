services:
  postgres:
    image: postgres:15-alpine
    container_name: medscript-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: medscript
      POSTGRES_PASSWORD: medscript_dev
      POSTGRES_DB: medscript
    ports:
      - "5432:5432"
    volumes:
      - medscript_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medscript -d medscript"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: medscript-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - medscript_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  medscript_pgdata:
  medscript_redisdata:
