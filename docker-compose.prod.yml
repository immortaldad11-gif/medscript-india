# Production-style orchestration: web + (optional) worker + Postgres + Redis, with
# persistent volumes and a one-shot migration step.
#
#   cp .env.example .env       # then set REAL secrets (JWT_*, FIELD_ENCRYPTION_KEY, ...)
#   docker compose -f docker-compose.prod.yml up -d --build
#
# The DB/Redis hostnames are overridden to the in-network service names, so the
# localhost URLs in .env are ignored here. Secrets still come from .env (kept out of
# the image). For real PHI, also set STORAGE_DRIVER=s3 and env-managed DSC keys.

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medscript}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medscript_dev}
      POSTGRES_DB: ${POSTGRES_DB:-medscript}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medscript}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: apply migrations then exit. Uses the build stage (it has the Prisma CLI).
  migrate:
    build:
      context: .
      target: build
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-medscript}:${POSTGRES_PASSWORD:-medscript_dev}@postgres:5432/${POSTGRES_DB:-medscript}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      target: runner
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-medscript}:${POSTGRES_PASSWORD:-medscript_dev}@postgres:5432/${POSTGRES_DB:-medscript}?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # Optional async worker — only started with `--profile worker` and only meaningful
  # when QUEUE_ENABLED=1 (otherwise the web app processes jobs inline). Runs from source
  # via tsx, so it uses the build stage.
  worker:
    profiles: ["worker"]
    build:
      context: .
      target: build
    command: npm run worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-medscript}:${POSTGRES_PASSWORD:-medscript_dev}@postgres:5432/${POSTGRES_DB:-medscript}?schema=public
      REDIS_URL: redis://redis:6379
    volumes:
      - storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  storage:
